name: Budowanie Schowka

on:
  push:
    branches: [ "main" ] # Uruchamia się przy każdym zapisie do gałęzi main
  workflow_dispatch:      # Pozwala uruchomić budowanie ręcznie

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Kompilacja projektu (Maven)
      run: mvn -B package --file pom.xml

    - name: Gotowy plik do pobrania
      uses: actions/upload-artifact@v4
      with:
        name: Schowek-Plugin
        path: target/*.jar
